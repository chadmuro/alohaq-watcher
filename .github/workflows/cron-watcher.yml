name: alohaq-watcher

on:
  schedule:
    # Every 15 minutes, offset from :00/:15/:30/:45 to dodge the top-of-hour
    # congestion GitHub warns scheduled workflows about. GitHub cron is UTC.
    - cron: "1,16,31,46 * * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

# Allow the job to commit the updated seen.json back to the repo.
permissions:
  contents: write

concurrency:
  group: alohaq-watcher
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run checker
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python check.py

      - name: Persist de-dup state
        if: always()
        run: |
          git config user.name "alohaq-bot"
          git config user.email "alohaq-bot@users.noreply.github.com"
          git add seen.json || true
          git diff --cached --quiet || git commit -m "update seen state [skip ci]"
          git push || true
